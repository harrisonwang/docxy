name: 构建与发布

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-amd64:
    name: 构建与发布 AMD64
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Rust 环境
        uses: dtolnay/rust-toolchain@stable

      - name: 构建发布版本
        run: cargo build --release

      - name: 获取版本号
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            SAFE_BRANCH=$(echo "${BRANCH}" | tr '/' '-' | tr -cd '[:alnum:]-._')
            VERSION="${SAFE_BRANCH}-${GITHUB_SHA:0:7}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 准备二进制文件
        run: |
          cp target/release/wharf wharf-v${{ steps.get_version.outputs.VERSION }}-linux-amd64
          chmod +x wharf-v${{ steps.get_version.outputs.VERSION }}-linux-amd64

      - name: 创建 Release
        id: create_release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: wharf ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            Docker Registry 代理服务 v${{ steps.get_version.outputs.VERSION }}

            ## 构建版本
            - Linux AMD64 (x86_64)
            - Linux ARM (aarch64)
          files: |
            ./wharf-v${{ steps.get_version.outputs.VERSION }}-linux-amd64

      - name: 上传构建产物（分支 / 手动）
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: wharf-linux-amd64-${{ steps.get_version.outputs.VERSION }}
          path: ./wharf-v${{ steps.get_version.outputs.VERSION }}-linux-amd64

  build-and-release-arm64:
    name: 构建与发布 ARM64
    runs-on: ubuntu-22.04-arm
    needs: build-and-release-amd64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Rust 环境
        uses: dtolnay/rust-toolchain@stable

      - name: 构建发布版本
        run: cargo build --release

      - name: 获取版本号
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            SAFE_BRANCH=$(echo "${BRANCH}" | tr '/' '-' | tr -cd '[:alnum:]-._')
            VERSION="${SAFE_BRANCH}-${GITHUB_SHA:0:7}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 准备二进制文件
        run: |
          cp target/release/wharf wharf-v${{ steps.get_version.outputs.VERSION }}-linux-arm64
          chmod +x wharf-v${{ steps.get_version.outputs.VERSION }}-linux-arm64

      - name: 上传到已存在的 Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./wharf-v${{ steps.get_version.outputs.VERSION }}-linux-arm64

      - name: 上传构建产物（分支 / 手动）
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: wharf-linux-arm64-${{ steps.get_version.outputs.VERSION }}
          path: ./wharf-v${{ steps.get_version.outputs.VERSION }}-linux-arm64
